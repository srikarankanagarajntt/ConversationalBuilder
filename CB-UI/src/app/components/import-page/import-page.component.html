<div class="vh-100 d-flex">
<div class="flex-grow-1 d-flex flex-column bg-light">
 
  <!-- Heading -->
  <div class="text-center mt-4 mb-3">
    <h3>Are you uploading an existing resume?</h3>
    <p class="text-muted">We’ll review and enhance it, or guide you from scratch</p>
  </div>
 
  <!-- Options -->
  <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="row w-100" style="max-width: 900px;">
 
      <!-- Upload Option -->
      <div class="col-md-6 mb-4" (click)="fileInput.click()">
        <div class="card h-100 p-4 text-center shadow-sm" style="cursor:pointer"
             [class.border-primary]="importChoice === 'upload'"
             (click)="importChoice = 'upload'">
 
          <div class="mb-3">
            <i class="bi bi-upload" style="font-size: 40px;"></i>
          </div>
 
          <h5 class="mb-2">Yes, upload my resume</h5>
          <p class="text-muted small">
            We'll extract and enhance your information automatically
          </p>
 
        </div>
      </div>
 
      <!-- Start Fresh -->
      <div class="col-md-6 mb-4">
        <div class="card h-100 p-4 text-center shadow-sm" style="cursor:pointer"
             [class.border-primary]="importChoice === 'scratch'"
             (click)="importChoice = 'scratch'">
 
          <div class="mb-3">
            <i class="bi bi-pencil" style="font-size: 40px;"></i>
          </div>
 
          <h5 class="mb-2">No, start from scratch</h5>
          <p class="text-muted small">
            We'll guide you step-by-step to build your resume
          </p>
 
        </div>
      </div>
 
    </div>
  </div>
 
  <!-- Bottom Actions -->
  <div class="border-top p-3 d-flex justify-content-between">
    <button class="btn btn-outline-secondary" (click)="goToTemplateScreen()">Back</button>
    <button class="btn btn-primary" [disabled]="!importChoice" (click)="goToChatScreen()">Next</button>
  </div>
 
</div>
</div>

<input type="file" #fileInput hidden (change)="onFileUpload($event)" />
