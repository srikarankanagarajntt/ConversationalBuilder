<!-- SCREEN 2: EXPERIENCE -->

<div class="flex-grow-1 d-flex flex-column justify-content-center align-items-center bg-light">
    <div class="text-center mb-4">
        <h3>What's your experience level?</h3>
        <p class="text-muted">Select one or enter manually</p>
    </div>



    <div class="d-flex flex-wrap gap-3 justify-content-center mb-4" style="max-width: 500px;">
        <div class="card p-3 text-center" style="width: 120px; cursor:pointer" *ngFor="let exp of experienceOptions"
            [class.border-primary]="selectedExperience === exp" (click)="selectExperience(exp)">
            {{exp}}
        </div>
    </div>



    <div class="w-50 mb-3">
        <input [(ngModel)]="customExperience" class="form-control"
            placeholder="Or type your experience (e.g. 5 years)" />
    </div>

    <button class="btn btn-primary" (click)="goToTemplateSelectionPage()">Next</button>
</div>
