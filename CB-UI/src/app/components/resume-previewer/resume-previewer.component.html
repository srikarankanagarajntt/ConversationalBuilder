<div *ngIf="showPreview" class="position-fixed top-0 start-0 w-100 h-100 bg-light d-flex flex-column">
  <div class="p-2 border-bottom d-flex justify-content-between">
    <h5>Resume Ready 🎉</h5>
    <button class="btn btn-outline-danger" (click)="reset()">Start Over</button>
  </div>
  <div class="flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="bg-white shadow p-4" style="width: 600px; height: 800px; overflow:auto;">
      <h4>Generated Resume</h4>
      <p>(Final resume content here)</p>
    </div>
  </div>
  <div class="p-3 text-center border-top">
    <button class="btn btn-primary">Download PDF</button>
  </div>
</div>
